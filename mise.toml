[env]
MISE_USE_VERSIONS_HOST = "0"

[tools]
actionlint = "latest"
hk = "latest"
lua = "5.4"
lua-language-server = "latest"
pkl = "latest"
stylua = "latest"

[tasks.format]
description = "Format Lua scripts"
run = "stylua metadata.lua hooks/ lib/"

[tasks.lint]
description = "Lint Lua scripts and GitHub Actions using hk"
run = "hk check"

[tasks.lint-fix]
description = "Fix linting issues"
run = "hk fix"

[tasks.link_plugin]
description = "Link local plugin to test"
run = '''
mise plugins link --force zephyr-sdk-test .
mise cache clear
'''

[tasks.ls_remote]
description = "Look at available version"
depends = ["link_plugin"]
usage = '''
arg "<tool>" help="Tool" {
    default "arm-zephyr-eabi-gcc"
}
'''
run = '''
mise ls-remote "zephyr-sdk-test:${usage_tool?}
'''
[tasks.install_tool]
description = "Install tool version"
usage = '''
arg "<tool>" help="Tool" {
    default "minimal"
}
arg "<tool_version>" help="Tool Version" {
    default "0.17.4"
}
'''
run = '''
mise install "zephyr-sdk-test:${usage_tool?}@${usage_tool_version?}"
'''
[tasks.uninstall_tool]
description = "Install tool version"
usage = '''
arg "<tool>" help="Tool" {
    default "minimal"
}
arg "<tool_version>" help="Tool Version" {
    default "0.17.4"
}
'''
run = '''
mise uninstall "zephyr-sdk-test:${usage_tool?}@${usage_tool_version?}"
'''

[tasks.test]
description = "Run lint → smoke-test"
depends = ["lint", "format"]
usage = '''
arg "<sdk_version>" help="Zephyr SDK Version" {
    default "0.17.4"
}
'''
run = '''
mise run smoke-test zephyr-sdk-test ${usage_sdk_version?} "{{config_root}}/tests/tool_cmds.txt"
'''
[tasks.ci]
description = "Run all CI checks: lint → smoke-test → integration-test"
depends = ["test"]
usage = '''
arg "<sdk_version>" help="Zephyr SDK Version" {
    default "0.17.4"
}
'''
run = '''
WORKSPACE=$(mktemp -d)
mise run integration-test "${WORKSPACE?}" "${usage_sdk_version?}"
'''
