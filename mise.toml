[env]
MISE_USE_VERSIONS_HOST = "0"

[tools]
actionlint = "latest"
hk = "latest"
lua = "5.4"
lua-language-server = "latest"
pkl = "latest"
stylua = "latest"

[tasks.format]
description = "Format Lua scripts"
run = "stylua metadata.lua hooks/ lib/"

[tasks.lint]
description = "Lint Lua scripts and GitHub Actions using hk"
run = "hk check"

[tasks.lint-fix]
description = "Fix linting issues"
run = "hk fix"

[tasks.test]
description = "Run lint → smoke-test"
depends = ["lint", "format"]
usage = '''
arg "<sdk_version>" help="Zephyr SDK Version" {
    default "0.17.4"
}
'''
run = '''
BACKEND=zephyr-sdk-test BACKEND_VERSION="${usage_sdk_version:?}" mise run smoke-test
'''
