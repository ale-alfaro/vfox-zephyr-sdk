[env]
MISE_USE_VERSIONS_HOST = "0"

[tools]
actionlint = "latest"
hk = "latest"
lua = "5.4"
lua-language-server = "latest"
pkl = "latest"
stylua = "latest"
zephyr-sdk = "1.0.0"

[tasks.format]
description = "Format Lua scripts"
run = "stylua metadata.lua hooks/ lib/"

[tasks.lint]
description = "Lint Lua scripts and GitHub Actions using hk"
run = "hk check"

[tasks.lint-fix]
description = "Fix linting issues"
run = "hk fix"

[tasks.install_plugin]
run = '''
mise plugin link --force zephyr-sdk .
mise cache clear
mise --debug install zephyr-sdk
'''

[tasks.use_plugin]
usage = '''
arg "<sdk_version>" {
    help "Zephyr SDK Version"
    default "0.17.4"
}
'''
run = '''
SDK_VERSION="${usage_sdk_version:?}"
mise_toolname="zephyr-sdk@${SDK_VERSION}"
mise use "${mise_toolname?}"
'''

[tasks.ci]
description = "Run all CI checks"
depends = ["lint", "smoke-test", "integration-test"]
