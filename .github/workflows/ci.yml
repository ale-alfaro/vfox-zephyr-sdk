name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  ci:
    strategy:
      matrix:
        zephyr_sdk_version: ["0.17.4"]
    runs-on: ubuntu-latest
    env:
      BACKEND: zephyr-ci-${{ github.run_id }}
      ZEPHYR_SDK_VERSION: ${{ matrix.zephyr_sdk_version }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends zsh gcc-multilib g++-multilib device-tree-compiler
      - name: Cache west repositories
        uses: actions/cache@v4
        with:
          path: .cache/west
          key: west-${{ matrix.zephyr_sdk_version }}-${{ hashFiles('mise.ci.toml') }}
          restore-keys: |
            west-${{ matrix.zephyr_sdk_version }}-
            west-
      - run: |
          mise -E ci run ci --continue-on-error --timeout 10m --jobs 4
