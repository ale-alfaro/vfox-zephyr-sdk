name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      WEST_CACHE: .cache/west
      MISE_ENV: ci
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends zsh
          gcc-multilib g++-multilib device-tree-compiler
      - name: Lua typecheck and linting
        run: mise run lint
      - name: Cache west repositories
        uses: actions/cache@v4
        with:
          path: .cache/west
          key: west-${{ hashFiles('mise.ci.toml') }}
      - name: Run tests
        run: mise run test --timeout 10m
