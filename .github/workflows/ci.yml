name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  smoke-test:
    strategy:
      fail-fast: false
      matrix:
        version: ["0.17.0", "0.17.4", "1.0.0"]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      BACKEND: zephyr-sdk-test
      BACKEND_VERSION: ${{ matrix.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
      - name: Cache Zephyr SDK
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk-root
          key: zephyr-sdk-${{ runner.os }}-${{ matrix.version }}
      - run: mise run smoke-test
      - run: mise run integration-test
