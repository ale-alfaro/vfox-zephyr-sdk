name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          mise_toml: |
            [tools]
            lua = { version ="5.1", postinstall = 'luarocks install luacheck' }
            lua-language-server = "latest"
      - name: LuaLS type check
        run: |
          luacheck --check .
      - name: LuaLS type check
        run: |
          lua-language-server --check . --checklevel=Error --logpath="$RUNNER_TEMP/luals-log"

  smoke-test:
    needs: lint
    strategy:
      matrix:
        zephyr_sdk_version: ["0.17.4"]
        ncs_version: ["3.2.1"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
          mise_toml: |
            [tools]
            uv = "latest"
            [env]
            MISE_USE_VERSIONS_HOST = "0"

            [tasks.test]
            description = "Tests"
            run = '''
            zephyr_sdk_version="${{ matrix.zephyr_sdk_version }}"
            ncs_version="${{ matrix.ncs_version }}"
            echo "Link!"
            mise plugins ln zephyr-sdk .
            echo "ls-remote!"
            mise ls-remote "zephyr-sdk:toolchain"
            mise ls-remote "zephyr-sdk:west"
            mise ls-remote "zephyr-sdk:ncs_toolchain"
            echo "Exec!"
            mise x "zephyr-sdk:toolchain[toolchains='arm-zephyr-eabi']@$zephyr_sdk_version" -- arm-zephyr-eabi-gcc --version
            mise x "zephyr-sdk:ncs_toolchain@$ncs_version" -- arm-zephyr-eabi-gcc --version
            mise x "zephyr-sdk:west" -- west --version
            echo "Finished!"
            '''
      - run: mise run test
