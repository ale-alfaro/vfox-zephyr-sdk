name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  smoke-test:
    strategy:
      matrix:
        zephyr_sdk_version: ["0.17.4"]
        ncs_version: ["3.2.1"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
          mise_toml: |
            [tools]
            uv = "latest"
            lua-language-server = "latest"

            [env]
            MISE_USE_VERSIONS_HOST = "0"

            [tasks.lint]
            description = "Lint"
            run = 'lua-language-server --check . --checklevel=Error --logpath="$RUNNER_TEMP/luals-log"'

            [tasks.test]
            description = "Tests"
            depends = ["lint"]
            run = '''
            zephyr_sdk_version="${{ matrix.zephyr_sdk_version }}"
            ncs_version="${{ matrix.ncs_version }}"
            echo "Link!"
            mise plugins ln zephyr-sdk .
            echo "ls-remote!"
            mise ls-remote "zephyr-sdk:toolchain"
            mise ls-remote "zephyr-sdk:west"
            mise ls-remote "zephyr-sdk:ncs_toolchain"
            echo "Exec!"
            mise x "zephyr-sdk:toolchain[toolchains='arm-zephyr-eabi']@$zephyr_sdk_version" -- arm-zephyr-eabi-gcc --version
            mise x "zephyr-sdk:ncs_toolchain@$ncs_version" -- arm-zephyr-eabi-gcc --version
            mise x "zephyr-sdk:west" -- west --version
            echo "Finished!"
            '''
      - run: mise run test
