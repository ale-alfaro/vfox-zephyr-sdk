name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  integration-test:
    strategy:
      fail-fast: false
      matrix:
        zepyhyr_sdk_version: ["0.17.0", "0.17.4", "1.0.0"]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
      - name: Cache Zephyr SDK toolchain
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk-root/zepyhyr-sdk-${{ matrix.zepyhyr_sdk_version }}
          key: zephyr-sdk-toolchain-${{ runner.os }}-${{ matrix.zepyhyr_sdk_version }}
      - run: mise run ci ${{ matrix.zepyhyr_sdk_version }}
