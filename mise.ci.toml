[env]
MISE_USE_VERSIONS_HOST = "0"

[tools]
uv = "latest"
lua-language-server = "latest"

[tasks.lint]
description = "Lint Lua sources"
run = 'lua-language-server --check . --checklevel=Error --logpath="${RUNNER_TEMP:-/tmp}/luals-log"'

[tasks.test]
sources = ["tests/tools/*"]
run = '''
#!/usr/bin/env zsh
set -euo pipefail
{% for file in task_source_files()  %}
  {% set variant = file | basename  %}
  {% set backend = variant ~ '-' ~ get_random(end=255) %}

  echo "Processing: {{variant}}"
  mise plugins ln "{{backend}}" "{{config_root}}"
  typeset -a tools
  tools=()
  {% for tool in read_file(path=file) | trim | split(pat='\n') %}
    tool_name="{{backend}}:{{ tool }}"
    mise ls-remote "${tool_name}"
    {%if tool is containing("toolchain") %}
      mise x "$tool_name" -- arm-zephyr-eabi-gcc --version
    {%elif tool is matching("^\w+\[") %}
      mise x "$tool_name" -- {{ tool | split(pat="[") | first }} --version
    {%elif tool is matching("^\w+@") %}
      mise x "$tool_name" -- {{ tool | split(pat='@') | first }} --version
    {% else %}
      mise x "$tool_name" -- {{ tool }} --version
    {% endif %}
    tools+=("$tool_name")
  {% endfor %}

  mkdir -p "${WEST_CACHE?}"
  mkdir -p {{variant}}-workspace/app
  cp tests/{{variant}}-manifest.yml {{variant}}-workspace/app/west.yml
  BACKEND="{{backend}}" mise run --cd {{variant}}-workspace integration-test ${tools[@]}
{% endfor %}
'''
