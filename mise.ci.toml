[env]
MISE_USE_VERSIONS_HOST = "0"
WORKSPACE = "{{config_root}}/fake_workspace"
WEST_CACHE = "{{config_root}}/.cache/west"

[tools]
lua-language-server = "latest"

[tasks.lint]
description = "Lint Lua sources"
run = 'lua-language-server --check . --checklevel=Error --logpath="${RUNNER_TEMP:-/tmp}/luals-log"'

[tasks.setup-test]
hide = true
run = '''
mise plugins link "${BACKEND}" "${MISE_CONFIG_ROOT:?}" --force
mkdir -p "${WORKSPACE?}/app"
# ── Write minimal west manifest ────────────────────────────────────
cat >"${WORKSPACE}/app/west.yml" <<YAML
manifest:
  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos
  projects:
    - name: zephyr
      remote: zephyrproject-rtos
      revision: v4.3.0
      clone-depth: 1
      import:
        name-allowlist:
          - cmsis
  self:
    path: app
YAML
'''

[tasks.smoke-test]
run = '''
#!/usr/bin/env zsh
set -euo pipefail

tools=(${(f)"$(<tests/tools.txt)"})
print "Testing backend ${BACKEND:?}:"
print -rl "${tools[@]}"

for tool in "${tools[@]}"; do
  arr=("${(s.:.)tool}")
  name="${arr[1]}"
  version="${arr[2]}"
  cmd=(${arr[3]})
  MX=(mise x "${BACKEND}:${name}@${version}" --)
  print -R "--- ${name}@${version} ---"

  print "Testing version listing..."
  mise ls-remote "${BACKEND}:${name}"

  print "Executing: ${cmd[@]}"
  ${MX[@]} ${=cmd[@]}
done
'''

[tasks.integration-test]
hide = true
dir = "{{ config_root }}/fake_workspace"
env = { ZEPHYR_BASE = "{{config_root}}/fake_workspace/zephyr" }
run = '''

MX_WEST=(mise x "${BACKEND}:west" --)
MX_BUILD=(mise x "${BACKEND}:west" "${BACKEND}:toolchain[toolchains='arm-zephyr-eabi']@${ZEPHYR_SDK_VERSION}" --)
${MX_WEST[@]} west init -l "${WORKSPACE}/app"
mkdir -p "${WEST_CACHE}"
${MX_WEST[@]} west config --global update.auto-cache "${WEST_CACHE}"
${MX_WEST[@]} west config --global update.narrow true
echo "BACKEND=${BACKEND} ZEPHYR_SDK_VERSION=${ZEPHYR_SDK_VERSION}"
# ── West init & update ─────────────────────────────────────────────
${MX_WEST[@]} west config manifest.project-filter "+cmsis.*"
${MX_WEST[@]} west config zephyr.base "${ZEPHYR_BASE}"
${MX_WEST[@]} west update --narrow --fetch-opt=--depth=1
${MX_BUILD[@]} west build -p -b native_sim -s zephyr/samples/hello_world -d build
# ── Verify output ──────────────────────────────────────────────────
echo "Integration test: zephyr.exe built successfully"

'''

[tasks.cleanup-test]
hide = true
run = '''
[[ -d "${WORKSPACE}" ]] && rm -rf "${WORKSPACE}"
'''

[tasks.ci]
description = "Run all CI checks"
tools = { uv = "latest" }
run = [
  { task = 'lint' },
  { task = 'setup-test' },
  { task = 'smoke-test' },
  { task = 'integration-test' },
  { task = 'cleanup-test' },
]
