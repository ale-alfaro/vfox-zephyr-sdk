[env]
MISE_USE_VERSIONS_HOST = "0"
WORKSPACE = "${BACKEND?}-fake-workspace"

[tools]
uv = "latest"
lua-language-server = "latest"

[tasks.lint]
description = "Lint Lua sources"
run = 'lua-language-server --check . --checklevel=Error --logpath="${RUNNER_TEMP:-/tmp}/luals-log"'

[tasks.setup_workspace]
run = '''
mkdir -p "${WEST_CACHE?}"
mkdir -p "${WORKSPACE?}/app"
cp tests/${BACKEND}-manifest.yml "${WORKSPACE}/app/west.yml"

'''

[tasks.run-test]
run = '''
#!/usr/bin/env zsh
set -euo pipefail
mise plugins link "${BACKEND?}" "${MISE_CONFIG_ROOT:?}"

cleanup(){
  [[ -d "${WORKSPACE}" ]] && rm -rf "${WORKSPACE}"
}
trap cleanup EXIT

print "Testing ${BACKEND}"
tools=(${(f)"$(<tests/${BACKEND}-tools.txt)"})
print -rl "${tools[@]}"
export TOOLCHAIN_TOOL="${BACKEND}:${tools[1]}"
export WEST_TOOL="${BACKEND}:${tools[2]}"
mise ls-remote "${TOOLCHAIN_TOOL}"
mise ls-remote "${WEST_TOOL}"
mise x "${TOOLCHAIN_TOOL}" -- arm-zephyr-eabi-gcc --version
mise x "${WEST_TOOL}" -- west --version
mise run --cd "${WORKSPACE}" integration-test
'''
