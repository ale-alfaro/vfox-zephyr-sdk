[env]
MISE_USE_VERSIONS_HOST = "0"

[tools]
uv = "latest"
cmake = "latest"
lua-language-server = "latest"

[vars]
_.file = "{{config_root}}/tests/configs/zephyr.env"

[tasks.lint]
description = "Lint Lua sources"
run = 'lua-language-server --check . --checklevel=Error --logpath="${RUNNER_TEMP:-/tmp}/luals-log"'

[task_templates."test:script"]
run = '''
#!/usr/bin/env zsh

{% macro generate_test_script() %}
  {% set backend = vars.variant ~ '-' ~ get_random(end=255) %}
  {% set manifest = vars.variant ~ '-manifest' %}
  {% set workspace = vars.variant ~ '-workspace' %}
  {% set toolchain = backend  ~ ':' ~ vars.toolchain %}
  {% set west = backend  ~ ':' ~ vars.west %}
  echo "=== Backend {{ backend }} ==="
  mise plugins ln '{{ backend }}' "{{config_root}}"

  mise ls-remote "{{toolchain}}"
  mise ls-remote "{{west}}"
  mise x "{{toolchain}}" -- arm-zephyr-eabi-gcc --version
  mise x "{{west}}" -- west --version

  mkdir -p ~/.cache/west
  mkdir -p {{workspace}}/app
  cp tests/{{ manifest }}.yml {{ workspace}}/app/west.yml

  _west=(mise x '--cd'  {{ workspace }} "{{west}}" '--' west)
  _west_build=(mise x '--cd' {{ workspace }} "{{ west}}" "{{ toolchain }}" '--' west build)
  $_west init -l app
  $_west update -o=--depth=1 --narrow --auto-cache ~/.cache/west
  $_west_build -p -b {{vars.board}}  {{vars.sample}} -d build

  if [[ -d {{ workspace }}/build ]]; then
    echo "Integration test: build succeeded"
  else
    echo "Integration test: build directory not found"
  fi
  rm -rf {{ workspace }}
  mise remove {{backend}}
  mise plugins remove --all
  mise reshim
{% endmacro generate_test_script %}


{% if not env.DRY_RUN is defined %}
  {{ self::generate_test_script() }}
{% else %}
  echo "Dry-run! Printing script:"
  print '{{ self::generate_test_script() }}'
{% endif %}
'''

[tasks.zephyr_test]
extends = "test:script"

[tasks.zephyr_alias_test]
vars.'_' = { file = "{{config_root}}/tests/configs/alias.env" }
extends = "test:script"

[tasks.ncs_test]
vars.'_' = { file = "{{config_root}}/tests/configs/ncs.env" }
extends = "test:script"

[tasks.test]
run = [
  { task = "zephyr_test" },
  { task = "zephyr_alias_test" },
  { task = "ncs_test" },
]
